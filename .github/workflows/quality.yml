name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Bun / React
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Verify repository boundaries
        run: bun scripts/repository-hygiene.mjs
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Run frontend tests
        run: bun run test
      - name: Type-check frontend
        run: bun run check
      - name: Build frontend
        run: bun run build

  provider:
    name: Python / ${{ matrix.provider }}
    runs-on: macos-14
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        provider: [ios-provider, proxy-provider]
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          version: 0.9.18
          enable-cache: true
      - name: Install locked provider environment
        run: |
          uv lock --check --project sidecars/${{ matrix.provider }}
          uv sync --project sidecars/${{ matrix.provider }} --extra test --locked
      - name: Run provider tests
        run: >-
          uv run --project sidecars/${{ matrix.provider }} --extra test --locked
          pytest -q sidecars/${{ matrix.provider }}/tests
      - name: Compile provider sources
        run: >-
          uv run --project sidecars/${{ matrix.provider }} --locked
          python -m compileall -q
          sidecars/${{ matrix.provider }}/src
          sidecars/${{ matrix.provider }}/tests

  rust:
    name: Rust / Tauri core
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: clippy,rustfmt
      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Run Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --all-targets
      - name: Run Clippy
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
